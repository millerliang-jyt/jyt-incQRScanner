<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JYT-inc History Log</title>
  <link rel="icon" href="assets/favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
  <link rel="stylesheet" href="assets/index.css">
</head>
<body>
<div id="history-app" class="min-h-screen flex flex-col max-w-xl mx-auto bg-white">
  <header class="ios-blur sticky top-0 z-50 px-4 py-4 flex items-center justify-between border-b border-gray-100">
    <h1 class="font-semibold text-lg flex items-center justify-between gap-x-2">
      🖥️ 本地暫存資料
      <span class="text-xs text-gray-400 uppercase font-light">History</span>
    </h1>
    <div class="flex items-center gap-2">
      <button v-if="logs.length" @click="clearLogs_H()" class="ios-btn text-xs hover:text-red-500 hover:bg-red-50 border hover:border-red-100 px-3 py-1 rounded-full font-semibold">清除全部</button>
      <span class="text-xs font-mono text-blue-600 bg-blue-50 px-3 py-1 rounded-full">{{ logs.length }} 筆</span>
    </div>
  </header>

  <main class="flex-1 p-4 md:p-6 pb-28 space-y-4">
    <dl class="flex items-center justify-between gap-2 bg-gray-50 border border-gray-100 rounded-3xl p-4">
      <dt class="text-sm text-gray-400 uppercase tracking-widest">Webhook 狀態</dt>
      <dd class="text-sm" :class="status === 'success' ? 'text-green-600' : status === 'error' ? 'text-red-500' : 'text-gray-500'">
        <span v-if="loading">loading...</span>
        <span v-else>{{ message || '等待操作' }}</span>
      </dd>
    </dl>

    <section class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
      <ol class="list-none m-0 p-0 overflow-x-auto">
        <li v-for="row in tableRows" :key="row.index + '-' + row.time" class="border-b border-gray-100 p-4 space-y-2">
          <header class="flex items-center justify-between space-x-2 font-mono text-gray-800">
            <input type="text" class="flex-grow w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-sm font-mono outline-none focus:border-blue-400 transition-colors" :value="row.assetId || '-'"/>
            <button @click="removeLog_H(row.index)" class="ios-btn whitespace-nowrap text-red-500 bg-red-50 border border-red-100 px-3 py-1.5 rounded-xl text-xs font-bold hover:bg-red-100">
              移除
            </button>
          </header>
          <footer class="flex flex-wrap items-center space-x-4">
            <div class="text-gray-600 text-sm truncate">👨‍💼 {{ row.inspector || '-' }}</div>
            <small class="text-gray-500 whitespace-nowrap">📅 {{ row.time || '-' }}</small>
            <span :class="statusClass_H(row.status)">{{ { success:'✓ 成功', duplicate:'✘ 重複', error: '失敗' }[row.status] || '-' }}</span>
          </footer>
        </li>
      </ol>
    </section>
  </main>

  <footer class="ios-blur sticky bottom-0 border-t border-gray-100 px-4 py-4 bg-white/90">
    <div class="flex gap-3">
      <a href="index.html" class="ios-btn flex-1 text-center bg-gray-100 text-gray-700 py-3 rounded-2xl font-bold text-sm border border-gray-200">
        返回首頁
      </a>
      <button @click="sendLogs_API" :disabled="loading || !logs.length" class="ios-btn flex-1 bg-gray-900 text-white py-3 rounded-2xl font-bold text-sm disabled:opacity-40">
        {{ loading ? 'loading...' : '發送資料' }}
      </button>
    </div>
  </footer>
</div>

<script>
new Vue({
  el: '#history-app',
  data() {
    return {
      storageKey: 'jyt_logs',
      webhookUrl: 'https://n8n-ursbpurk.ap-northeast-1.clawcloudrun.com/webhook/jyt-qrscreen',
      logs: [], // 本地日誌資料陣列
      loading: false, // 傳送狀態指示
      status: '', // 操作結果狀態（success / error）
      message: '' // 操作結果訊息
    }
  },
  computed: {
    tableRows() {
      return this.logs.map((log, index) => ({ ...log, index })).reverse()
    }
  },
  mounted() {
    this.logs = this.getLogs_H() // 監聽 localStorage 變化以即時更新日誌資料
  },
  methods: {
    // 清除所有日誌資料
    clearLogs_H() {
      if (!confirm('確定清除所有記錄？')) return
      this.logs = []
      localStorage.removeItem(this.storageKey)
      this.status = ''
      this.message = '已清除所有記錄'
    },
    // 根據狀態回傳對應的 CSS 類別
    statusClass_H(status) {
      const base = 'inline-flex px-2 py-1 rounded-full text-xs leading-3'
      if (status === 'success') return base + ' bg-green-50 border border-green-400 text-green-600'
      if (status === 'duplicate') return base + ' bg-orange-50 border border-orange-300 text-orange-500'
      return base + ' bg-red-50 border border-red-300 text-red-500'
    },
    // 從 localStorage 讀取並解析日誌資料
    getLogs_H() {
      try {
        const parsed = JSON.parse(localStorage.getItem(this.storageKey) || '[]')
        return Array.isArray(parsed) ? parsed : []
      } catch (error) {
        return []
      }
    },
    // 將當前日誌資料序列化並儲存到 localStorage
    saveLogs_H() {
      localStorage.setItem(this.storageKey, JSON.stringify(this.logs))
    },
    // 移除指定索引的日誌資料
    removeLog_H(index) {
      this.logs.splice(index, 1)
      this.saveLogs_H()
      this.status = 'success'
      this.message = '已移除 1 筆資料！'
    },
    // 傳送日誌資料到伺服器
    async sendLogs_API() {
      if (this.loading) return
      if (!this.logs.length) {
        this.status = 'error'
        this.message = '目前沒有可傳送資料！'
        return
      }
      this.loading = true
      this.status = ''
      this.message = 'loading...'
      try {
        const authToken = btoa('jyt-inc:66367777')
        const response = await fetch(this.webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic ' + authToken
          },
          body: JSON.stringify({
            total: this.logs.length,
            source: 'history_log',
            sentAt: new Date().toLocaleString('zh-TW', { hour12: false }),
            logs: this.logs
          })
        })
        const rawText = await response.text()
        let data = null
        if (rawText) {
          try {
            data = JSON.parse(rawText)
          } catch (error) {
            data = null
          }
        }
        if (!response.ok) {
          throw new Error((data && data.message) || rawText || ('HTTP ' + response.status))
        }
        this.status = (data && data.status) || 'success'
        this.message = '傳送成功！'
        if (confirm('傳送完成，是否清除暫存資料？')) {
          this.logs = []
          localStorage.removeItem(this.storageKey)
          this.message = '已傳送並清除暫存資料'
        }
      } catch (error) {
        this.status = 'error'
        this.message = error.message || '傳送失敗！'
      } finally {
        this.loading = false
      }
    }
  }
})
</script>
</body>
</html>
